name: Deploy to AWS ECS
on:
  push:
    branches: [main]
env:
  AWS_REGION: us-east-2
  ECS_CLUSTER: psicoconecta
  FRONTEND_S3_BUCKET: psicoconecta-frontend-060899556466

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: puerta-enlace
            path: backend/puerta-enlace-api
            port: 5000
            task-def: infraestructura/aws/task-definition-puerta-enlace.json
          - name: usuarios
            path: backend/servicios/servicio-usuarios
            port: 5001
            task-def: infraestructura/aws/task-definition-usuarios.json
          - name: citas
            path: backend/servicios/servicio-citas
            port: 5002
            task-def: ""
          - name: teleconsulta
            path: backend/servicios/servicio-teleconsulta
            port: 5003
            task-def: ""
          - name: pagos
            path: backend/servicios/servicio-pagos
            port: 5004
            task-def: ""
          - name: iot
            path: backend/servicios/servicio-inteligencia-iot
            port: 5005
            task-def: infraestructura/aws/task-definition-iot.json
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: psicoconecta/${{ matrix.service.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f ${{ matrix.service.path }}/Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS service (if task definition exists)
        if: ${{ matrix.service.task-def != '' }}
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID || '060899556466' }}
          TASK_DEF_FILE: ${{ matrix.service.task-def }}
        run: |
          sed "s/ACCOUNT_ID/$AWS_ACCOUNT_ID/g" "$TASK_DEF_FILE" > /tmp/task-definition.json
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/task-definition.json --region $AWS_REGION --query "taskDefinition.taskDefinitionArn" --output text)
          echo "Task definition: $TASK_DEF_ARN"
          aws ecs update-service --cluster $ECS_CLUSTER --service ${{ matrix.service.name }} --task-definition $TASK_DEF_ARN --force-new-deployment --region $AWS_REGION

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names psicoconecta-alb \
            --region "$AWS_REGION" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          export VITE_API_URL="http://$ALB_DNS"
          export VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID:-339658076678-kah0e205d5asf6ufnlh009lh5i4g8u70.apps.googleusercontent.com}"
          cd frontend
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> .env
          npm install
          npm run build
          echo "Frontend built with VITE_API_URL=$VITE_API_URL"

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://$FRONTEND_S3_BUCKET --delete
          aws s3 website s3://$FRONTEND_S3_BUCKET --index-document index.html --error-document index.html

      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?DomainName.contains(@, 'psicoconecta-frontend')]].Id" --output text 2>/dev/null || true)
          if [ -n "$CF_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*" || true
          fi
