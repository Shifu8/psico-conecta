name: Deploy to existing AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: psicoconecta-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECS_CLUSTER: psicoconecta
  SERVICE_CONNECT_NAMESPACE: psicoconecta.local
  FRONTEND_S3_BUCKET: psicoconecta-frontend-060899556466
  CLOUDFRONT_URL: https://d1wkhs3cq8vcom.cloudfront.net

jobs:
  check-deploy-config:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - id: check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS credentials are not configured; deployment jobs will be skipped."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: check-deploy-config
    if: ${{ needs.check-deploy-config.outputs.can_deploy == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve existing AWS account and cluster
        id: aws-context
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecs describe-clusters --clusters "$ECS_CLUSTER" --region "$AWS_REGION" \
            --query 'clusters[0].clusterArn' --output text | grep -v '^None$'
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Synchronize application secrets in AWS Secrets Manager
        env:
          DATABASE_URL_VALUE: ${{ secrets.DATABASE_URL }}
          SECRET_KEY_VALUE: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY_VALUE: ${{ secrets.JWT_SECRET_KEY }}
          TELECONSULTA_INTERNAL_TOKEN_VALUE: ${{ secrets.TELECONSULTA_INTERNAL_TOKEN }}
          PAGOS_INTERNAL_TOKEN_VALUE: ${{ secrets.PAGOS_INTERNAL_TOKEN }}
          ZOOM_ACCOUNT_ID_VALUE: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID_VALUE: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET_VALUE: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_HOST_USER_ID_VALUE: ${{ secrets.ZOOM_HOST_USER_ID }}
          ZOOM_WEBHOOK_SECRET_TOKEN_VALUE: ${{ secrets.ZOOM_WEBHOOK_SECRET_TOKEN }}
          STRIPE_SECRET_KEY_VALUE: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET_VALUE: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GOOGLE_CLIENT_ID_VALUE: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_VALUE: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN_VALUE: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SENDER_EMAIL_VALUE: ${{ secrets.GOOGLE_SENDER_EMAIL }}
          TURNSTILE_SECRET_KEY_VALUE: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          set -euo pipefail
          faltantes=()

          sincronizar_secreto() {
            local nombre="$1"
            local valor="$2"
            local requerido="$3"
            local secret_id="psicoconecta/$nombre"

            if [ -n "$valor" ]; then
              if aws secretsmanager describe-secret --secret-id "$secret_id" --region "$AWS_REGION" >/dev/null 2>&1; then
                aws secretsmanager put-secret-value \
                  --secret-id "$secret_id" \
                  --secret-string "$valor" \
                  --region "$AWS_REGION" >/dev/null
              else
                aws secretsmanager create-secret \
                  --name "$secret_id" \
                  --secret-string "$valor" \
                  --region "$AWS_REGION" >/dev/null
              fi
              echo "Secret $secret_id actualizado."
              return
            fi

            if aws secretsmanager describe-secret --secret-id "$secret_id" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Secret $secret_id conservado desde el despliegue existente."
            elif [ "$requerido" = "true" ]; then
              faltantes+=("$nombre")
            else
              echo "Secret opcional $secret_id no configurado."
            fi
          }

          sincronizar_secreto DATABASE_URL "$DATABASE_URL_VALUE" true
          sincronizar_secreto SECRET_KEY "$SECRET_KEY_VALUE" true
          sincronizar_secreto JWT_SECRET_KEY "$JWT_SECRET_KEY_VALUE" true
          sincronizar_secreto TELECONSULTA_INTERNAL_TOKEN "$TELECONSULTA_INTERNAL_TOKEN_VALUE" true
          sincronizar_secreto PAGOS_INTERNAL_TOKEN "$PAGOS_INTERNAL_TOKEN_VALUE" true
          sincronizar_secreto ZOOM_ACCOUNT_ID "$ZOOM_ACCOUNT_ID_VALUE" true
          sincronizar_secreto ZOOM_CLIENT_ID "$ZOOM_CLIENT_ID_VALUE" true
          sincronizar_secreto ZOOM_CLIENT_SECRET "$ZOOM_CLIENT_SECRET_VALUE" true
          sincronizar_secreto ZOOM_HOST_USER_ID "$ZOOM_HOST_USER_ID_VALUE" true
          sincronizar_secreto ZOOM_WEBHOOK_SECRET_TOKEN "$ZOOM_WEBHOOK_SECRET_TOKEN_VALUE" true
          sincronizar_secreto STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY_VALUE" true
          sincronizar_secreto STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET_VALUE" true

          sincronizar_secreto GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID_VALUE" false
          sincronizar_secreto GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET_VALUE" false
          sincronizar_secreto GOOGLE_REFRESH_TOKEN "$GOOGLE_REFRESH_TOKEN_VALUE" false
          sincronizar_secreto GOOGLE_SENDER_EMAIL "$GOOGLE_SENDER_EMAIL_VALUE" false
          sincronizar_secreto TURNSTILE_SECRET_KEY "$TURNSTILE_SECRET_KEY_VALUE" false

          if [ ${#faltantes[@]} -gt 0 ]; then
            printf 'Faltan secretos obligatorios en GitHub o AWS Secrets Manager: %s\n' "${faltantes[*]}"
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, validate and push backend images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          servicios=(
            "usuarios|backend/servicios/servicio-usuarios"
            "citas|backend/servicios/servicio-citas"
            "teleconsulta|backend/servicios/servicio-teleconsulta"
            "pagos|backend/servicios/servicio-pagos"
            "iot|backend/servicios/servicio-inteligencia-iot"
            "puerta-enlace|backend/puerta-enlace-api"
          )

          for entrada in "${servicios[@]}"; do
            IFS='|' read -r servicio ruta <<< "$entrada"
            repositorio="psicoconecta/$servicio"
            imagen="$ECR_REGISTRY/$repositorio:${GITHUB_SHA}"

            if ! aws ecr describe-repositories --repository-names "$repositorio" --region "$AWS_REGION" >/dev/null 2>&1; then
              aws ecr create-repository \
                --repository-name "$repositorio" \
                --image-scanning-configuration scanOnPush=true \
                --region "$AWS_REGION" >/dev/null
            fi

            docker build -t "$imagen" -f "$ruta/Dockerfile" .
            docker tag "$imagen" "$ECR_REGISTRY/$repositorio:latest"

            if [ "$servicio" = "pagos" ]; then
              docker run --rm --entrypoint pytest "$imagen" -q -p no:cacheprovider
            fi

            docker push "$imagen"
            docker push "$ECR_REGISTRY/$repositorio:latest"
          done

      - name: Ensure log groups and Service Connect namespace
        id: service-connect
        run: |
          set -euo pipefail
          for servicio in usuarios citas teleconsulta pagos iot puerta-enlace; do
            aws logs create-log-group \
              --log-group-name "/ecs/psicoconecta-$servicio" \
              --region "$AWS_REGION" 2>/dev/null || true
          done

          NAMESPACE_ARN=$(aws servicediscovery list-namespaces \
            --query "Namespaces[?Name=='$SERVICE_CONNECT_NAMESPACE'].Arn | [0]" \
            --output text --region "$AWS_REGION")

          if [ -z "$NAMESPACE_ARN" ] || [ "$NAMESPACE_ARN" = "None" ]; then
            OPERATION_ID=$(aws servicediscovery create-http-namespace \
              --name "$SERVICE_CONNECT_NAMESPACE" \
              --description "Descubrimiento interno de los servicios PsicoConecta" \
              --region "$AWS_REGION" \
              --query OperationId --output text)
            for _ in $(seq 1 30); do
              ESTADO=$(aws servicediscovery get-operation \
                --operation-id "$OPERATION_ID" \
                --region "$AWS_REGION" \
                --query Operation.Status --output text)
              [ "$ESTADO" = "SUCCESS" ] && break
              if [ "$ESTADO" = "FAIL" ]; then
                aws servicediscovery get-operation --operation-id "$OPERATION_ID" --region "$AWS_REGION"
                exit 1
              fi
              sleep 5
            done
            NAMESPACE_ARN=$(aws servicediscovery list-namespaces \
              --query "Namespaces[?Name=='$SERVICE_CONNECT_NAMESPACE'].Arn | [0]" \
              --output text --region "$AWS_REGION")
          fi

          if [ -z "$NAMESPACE_ARN" ] || [ "$NAMESPACE_ARN" = "None" ]; then
            echo "No fue posible resolver el namespace de Service Connect."
            exit 1
          fi
          echo "namespace_arn=$NAMESPACE_ARN" >> "$GITHUB_OUTPUT"

      - name: Register task definitions and update the existing ECS deployment
        env:
          AWS_ACCOUNT_ID: ${{ steps.aws-context.outputs.account_id }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NAMESPACE_ARN: ${{ steps.service-connect.outputs.namespace_arn }}
        run: |
          set -euo pipefail

          # Obtener la red desde cualquier servicio ECS existente.
          BASE_SERVICE=""
          BASE_NETWORK=""

          for candidato in usuarios citas teleconsulta pagos iot; do
            estado=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$candidato" \
              --region "$AWS_REGION" \
              --query 'services[0].status' \
              --output text 2>/dev/null || true)

            network=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$candidato" \
              --region "$AWS_REGION" \
              --query 'services[0].networkConfiguration' \
              --output json 2>/dev/null || true)

            if [ "$estado" = "ACTIVE" ] && \
               [ -n "$network" ] && \
               [ "$network" != "null" ]; then
              BASE_SERVICE="$candidato"
              BASE_NETWORK="$network"
              break
            fi
          done

          if [ -z "$BASE_SERVICE" ]; then
            echo "No se encontró ningún servicio ECS activo con red awsvpc."
            exit 1
          fi

          echo "Red reutilizada desde el servicio: $BASE_SERVICE"

          renderizar_task_definition() {
            local servicio="$1"
            local archivo="$2"
            local imagen="$ECR_REGISTRY/psicoconecta/$servicio:${GITHUB_SHA}"
            local salida="/tmp/task-definition-$servicio.json"

            python - "$archivo" "$salida" "$imagen" "$AWS_ACCOUNT_ID" "$AWS_REGION" "$servicio" <<'PY'
          import json
          import subprocess
          import sys

          origen, destino, imagen, cuenta, region, servicio = sys.argv[1:]
          with open(origen, encoding="utf-8") as archivo:
              datos = json.load(archivo)

          def reemplazar(valor):
              if isinstance(valor, str):
                  import re
                  return re.sub(r'(?<!ZOOM_)ACCOUNT_ID', cuenta, valor)
              if isinstance(valor, list):
                  return [reemplazar(item) for item in valor]
              if isinstance(valor, dict):
                  return {clave: reemplazar(item) for clave, item in valor.items()}
              return valor

          datos = reemplazar(datos)
          datos["containerDefinitions"][0]["image"] = imagen
          secretos = datos["containerDefinitions"][0].setdefault("secrets", [])

          if servicio == "usuarios":
              opcionales = [
                  "GOOGLE_CLIENT_ID",
                  "GOOGLE_CLIENT_SECRET",
                  "GOOGLE_REFRESH_TOKEN",
                  "GOOGLE_SENDER_EMAIL",
                  "TURNSTILE_SECRET_KEY",
              ]
              existentes = {item["name"] for item in secretos}
              for nombre in opcionales:
                  secret_id = f"psicoconecta/{nombre}"
                  proceso = subprocess.run(
                      [
                          "aws", "secretsmanager", "describe-secret",
                          "--secret-id", secret_id,
                          "--region", region,
                          "--query", "ARN",
                          "--output", "text",
                      ],
                      capture_output=True,
                      text=True,
                  )
                  if proceso.returncode == 0 and nombre not in existentes:
                      secretos.append({
                          "name": nombre,
                          "valueFrom": f"arn:aws:secretsmanager:{region}:{cuenta}:secret:{secret_id}",
                      })

          for secreto in secretos:
              valor = secreto["valueFrom"]
              if ":secret:" not in valor:
                  continue
              secret_id = valor.split(":secret:", 1)[1]
              arn = subprocess.check_output(
                  [
                      "aws", "secretsmanager", "describe-secret",
                      "--secret-id", secret_id,
                      "--region", region,
                      "--query", "ARN",
                      "--output", "text",
                  ],
                  text=True,
              ).strip()
              secreto["valueFrom"] = arn

          with open(destino, "w", encoding="utf-8") as archivo:
              json.dump(datos, archivo, ensure_ascii=False, indent=2)
          PY

            aws ecs register-task-definition \
              --cli-input-json "file://$salida" \
              --region "$AWS_REGION" \
              --query taskDefinition.taskDefinitionArn \
              --output text
          }

          configurar_service_connect() {
            local servicio="$1"
            local puerto="$2"
            if [ "$servicio" = "puerta-enlace" ]; then
              jq -cn --arg namespace "$NAMESPACE_ARN" \
                '{enabled:true, namespace:$namespace}'
            else
              jq -cn \
                --arg namespace "$NAMESPACE_ARN" \
                --arg portName "$servicio" \
                --arg discoveryName "$servicio" \
                --arg dnsName "$servicio" \
                --argjson port "$puerto" \
                '{enabled:true, namespace:$namespace, services:[{portName:$portName, discoveryName:$discoveryName, clientAliases:[{port:$port, dnsName:$dnsName}]}]}'
            fi
          }

          DEPLOYED_SERVICES=()

          desplegar_servicio() {
            local servicio="$1"
            local puerto="$2"
            local task_file="$3"
            local task_arn
            local sc_config
            local estado

            estado=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$servicio" \
              --region "$AWS_REGION" \
              --query 'services[0].status' --output text 2>/dev/null || true)

            if [ "$estado" != "ACTIVE" ] && [ "$estado" != "DRAINING" ]; then
              if [ "$servicio" = "puerta-enlace" ]; then
                echo "El servicio opcional puerta-enlace no está activo en el clúster; se omite el despliegue."
                return 0
              fi
              task_arn=$(renderizar_task_definition "$servicio" "$task_file")
              sc_config=$(configurar_service_connect "$servicio" "$puerto")
              aws ecs create-service \
                --cluster "$ECS_CLUSTER" \
                --service-name "$servicio" \
                --task-definition "$task_arn" \
                --desired-count 1 \
                --launch-type FARGATE \
                --network-configuration "$BASE_NETWORK" \
                --service-connect-configuration "$sc_config" \
                --region "$AWS_REGION" >/dev/null
            else
              task_arn=$(renderizar_task_definition "$servicio" "$task_file")
              sc_config=$(configurar_service_connect "$servicio" "$puerto")
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$servicio" \
                --task-definition "$task_arn" \
                --desired-count 1 \
                --service-connect-configuration "$sc_config" \
                --force-new-deployment \
                --region "$AWS_REGION" >/dev/null
            fi
            DEPLOYED_SERVICES+=("$servicio")
          }

          desplegar_servicio usuarios 5001 infraestructura/aws/task-definition-usuarios.json
          desplegar_servicio citas 5002 infraestructura/aws/task-definition-citas.json
          desplegar_servicio teleconsulta 5003 infraestructura/aws/task-definition-teleconsulta.json
          desplegar_servicio pagos 5004 infraestructura/aws/task-definition-pagos.json
          desplegar_servicio iot 5005 infraestructura/aws/task-definition-iot.json
          desplegar_servicio puerta-enlace 5000 infraestructura/aws/task-definition-puerta-enlace.json

          # Permite comunicación privada entre los grupos de seguridad de los servicios.
          SECURITY_GROUPS=()
          for servicio in "${DEPLOYED_SERVICES[@]}"; do
            while read -r grupo; do
              [ -n "$grupo" ] && [ "$grupo" != "None" ] && SECURITY_GROUPS+=("$grupo")
            done < <(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$servicio" --region "$AWS_REGION" \
              --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[]' \
              --output text 2>/dev/null || true | tr '\t' '\n')
          done
          mapfile -t SECURITY_GROUPS < <(printf '%s\n' "${SECURITY_GROUPS[@]}" | sort -u)
          for destino in "${SECURITY_GROUPS[@]}"; do
            for origen in "${SECURITY_GROUPS[@]}"; do
              aws ec2 authorize-security-group-ingress \
                --group-id "$destino" \
                --protocol tcp \
                --port 5000-5005 \
                --source-group "$origen" \
                --region "$AWS_REGION" >/dev/null 2>&1 || true
            done
          done

          echo "Esperando a que las nuevas tareas de los servicios estén activas..."
          for servicio in "${DEPLOYED_SERVICES[@]}"; do
            for i in $(seq 1 30); do
              primary_running=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$servicio" \
                --region "$AWS_REGION" \
                --query 'services[0].deployments[?status==`PRIMARY`].runningCount | [0]' \
                --output text 2>/dev/null || echo "0")
              desired=$(aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$servicio" \
                --region "$AWS_REGION" \
                --query 'services[0].desiredCount' \
                --output text 2>/dev/null || echo "1")
              if [ "$primary_running" = "$desired" ] && [ "$primary_running" != "None" ] && [ -n "$primary_running" ]; then
                echo "Servicio $servicio está listo con $primary_running tareas activas."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Advertencia: El servicio $servicio no se estabilizó a tiempo (deseado: $desired, activo: $primary_running), pero se continúa."
              fi
              sleep 10
            done
          done

      - name: Route the existing ALB API paths to the gateway
        run: |
          set -euo pipefail
          TARGET_GROUP=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services puerta-enlace --region "$AWS_REGION" \
            --query 'services[0].loadBalancers[0].targetGroupArn' --output text 2>/dev/null || true)
          if [ -z "$TARGET_GROUP" ] || [ "$TARGET_GROUP" = "None" ] || [ "$TARGET_GROUP" = "null" ]; then
            echo "El servicio puerta-enlace no existe o no tiene Target Group; se conserva la configuración actual."
            exit 0
          fi

          LOAD_BALANCER=$(aws elbv2 describe-target-groups \
            --target-group-arns "$TARGET_GROUP" --region "$AWS_REGION" \
            --query 'TargetGroups[0].LoadBalancerArns[0]' --output text)
          LISTENER=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$LOAD_BALANCER" --region "$AWS_REGION" \
            --query 'sort_by(Listeners,&Port)[-1].ListenerArn' --output text)
          aws elbv2 describe-rules --listener-arn "$LISTENER" --region "$AWS_REGION" > /tmp/alb-rules.json
          RULE_ARN=$(jq -r '.Rules[] | select(any(.Conditions[]?; .Field == "path-pattern" and ((.Values // []) | index("/api/*")))) | .RuleArn' /tmp/alb-rules.json | head -n1)

          if [ -n "$RULE_ARN" ]; then
            aws elbv2 modify-rule \
              --rule-arn "$RULE_ARN" \
              --actions "Type=forward,TargetGroupArn=$TARGET_GROUP" \
              --region "$AWS_REGION" >/dev/null
          else
            PRIORITY=10
            while jq -e --arg prioridad "$PRIORITY" '.Rules[] | select(.Priority == $prioridad)' /tmp/alb-rules.json >/dev/null; do
              PRIORITY=$((PRIORITY + 1))
            done
            aws elbv2 create-rule \
              --listener-arn "$LISTENER" \
              --priority "$PRIORITY" \
              --conditions 'Field=path-pattern,Values=/api/*' \
              --actions "Type=forward,TargetGroupArn=$TARGET_GROUP" \
              --region "$AWS_REGION" >/dev/null
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs:
      - check-deploy-config
      - deploy-backend
    if: ${{ needs.check-deploy-config.outputs.can_deploy == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend for the existing CloudFront URL
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
        run: |
          set -euo pipefail
          cd frontend
          cat > .env.production <<EOF
          VITE_API_URL=$CLOUDFRONT_URL
          VITE_GATEWAY_API_URL=$CLOUDFRONT_URL
          VITE_USERS_API_URL=$CLOUDFRONT_URL
          VITE_CITAS_API_URL=$CLOUDFRONT_URL
          VITE_TELECONSULTA_API_URL=$CLOUDFRONT_URL
          VITE_PAGOS_API_URL=$CLOUDFRONT_URL
          VITE_IOT_API_URL=$CLOUDFRONT_URL
          VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-339658076678-kah0e205d5asf6ufnlh009lh5i4g8u70.apps.googleusercontent.com}
          VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-}
          VITE_CAPTCHA_DESACTIVADO=true
          VITE_POSTHOG_KEY=${VITE_POSTHOG_KEY:-}
          VITE_POSTHOG_HOST=https://psico-conecta.brandon-medina.workers.dev/posthog
          EOF
          npm ci
          npm run build

      - name: Deploy frontend to the existing S3 bucket
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_S3_BUCKET" --delete --region "$AWS_REGION"

      - name: Invalidate the existing CloudFront distribution
        run: |
          DOMAIN=${CLOUDFRONT_URL#https://}
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='$DOMAIN'].Id | [0]" \
            --output text)
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths '/*' >/dev/null
          fi

      - name: Upload frontend dist as artifact for Workers deploy
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy-workers:
    runs-on: ubuntu-latest
    needs:
      - check-deploy-config
      - deploy-frontend
    if: ${{ needs.check-deploy-config.outputs.can_deploy == 'true' }}

    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: frontend
          wranglerVersion: '4.100.0'

      - name: Skip Cloudflare Workers deployment
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN no está configurado; se omite el despliegue a Workers."
