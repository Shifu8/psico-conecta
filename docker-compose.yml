services:
  postgres:
    image: postgres:16-alpine
    container_name: psicoconecta-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psicoconecta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infraestructura/postgres/inicializar_esquemas.sql:/docker-entrypoint-initdb.d/01-inicializar-esquemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psicoconecta"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: psicoconecta-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@psicoconecta.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  servicio-usuarios:
    image: python:3.11-slim
    container_name: psicoconecta-usuarios
    working_dir: /backend/servicios/servicio-usuarios
    volumes:
      - ./backend:/backend:ro
    env_file:
      - ./backend/servicios/servicio-usuarios/.env.example
      - ./.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/psicoconecta
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python datos_iniciales.py && python ejecutar.py"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  servicio-citas:
    image: python:3.11-slim
    container_name: psicoconecta-citas
    working_dir: /backend/servicios/servicio-citas
    volumes:
      - ./backend:/backend:ro
    env_file:
      - ./backend/servicios/servicio-citas/.env.example
      - ./.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/psicoconecta
      DB_SCHEMA: citas_schema
      USERS_SERVICE_URL: http://servicio-usuarios:5001
      VALIDAR_USUARIO_REMOTO: "true"
      TIMEZONE: America/Guayaquil
      CORS_ORIGINS: http://localhost:5173
      TELECONSULTA_SERVICE_URL: http://servicio-teleconsulta:5003
      TELECONSULTA_INTERNAL_TOKEN: ${TELECONSULTA_INTERNAL_TOKEN:-change_this_internal_service_token}
      PAGOS_SERVICE_URL: http://servicio-pagos:5004
      PAGOS_INTERNAL_TOKEN: ${PAGOS_INTERNAL_TOKEN:-change_this_payments_internal_token}
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python datos_iniciales.py && python ejecutar.py"
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      servicio-usuarios:
        condition: service_started

  servicio-teleconsulta:
    image: python:3.11-slim
    container_name: psicoconecta-teleconsulta
    working_dir: /backend/servicios/servicio-teleconsulta
    volumes:
      - ./backend:/backend:ro
    env_file:
      - ./backend/servicios/servicio-teleconsulta/.env.example
      - ./.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/psicoconecta
      DB_SCHEMA: teleconsulta_schema
      USERS_SERVICE_URL: http://servicio-usuarios:5001
      CITAS_SERVICE_URL: http://servicio-citas:5002
      VALIDAR_USUARIO_REMOTO: "true"
      TELECONSULTA_INTERNAL_TOKEN: ${TELECONSULTA_INTERNAL_TOKEN:-change_this_internal_service_token}
      TIMEZONE: America/Guayaquil
      CORS_ORIGINS: http://localhost:5173
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      ZOOM_HOST_USER_ID: ${ZOOM_HOST_USER_ID:-}
      ZOOM_HOSTS_JSON: "${ZOOM_HOSTS_JSON:-}"
      ZOOM_WEBHOOK_SECRET_TOKEN: ${ZOOM_WEBHOOK_SECRET_TOKEN:-}
      ACCESO_ANTES_PACIENTE_MIN: ${ACCESO_ANTES_PACIENTE_MIN:-10}
      ACCESO_ANTES_PSICOLOGO_MIN: ${ACCESO_ANTES_PSICOLOGO_MIN:-15}
      ACCESO_DESPUES_FIN_MIN: ${ACCESO_DESPUES_FIN_MIN:-30}
      PAGOS_SERVICE_URL: http://servicio-pagos:5004
      PAGOS_INTERNAL_TOKEN: ${PAGOS_INTERNAL_TOKEN:-change_this_payments_internal_token}
      REQUIRE_PAYMENT_FOR_TELECONSULTA: ${REQUIRE_PAYMENT_FOR_TELECONSULTA:-false}
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python ejecutar.py"
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      servicio-usuarios:
        condition: service_started
      servicio-citas:
        condition: service_started

  servicio-pagos:
    image: python:3.11-slim
    container_name: psicoconecta-pagos
    working_dir: /backend/servicios/servicio-pagos
    volumes:
      - ./backend:/backend:ro
    env_file:
      - ./backend/servicios/servicio-pagos/.env.example
      - ./.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/psicoconecta
      DB_SCHEMA: pagos_schema
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_jwt_secret_at_least_32_chars}
      USERS_SERVICE_URL: http://servicio-usuarios:5001
      CITAS_SERVICE_URL: http://servicio-citas:5002
      VALIDAR_USUARIO_REMOTO: "true"
      PAGOS_INTERNAL_TOKEN: ${PAGOS_INTERNAL_TOKEN:-change_this_payments_internal_token}
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_MAX_NETWORK_RETRIES: ${STRIPE_MAX_NETWORK_RETRIES:-2}
      DEFAULT_CONSULTATION_PRICE_CENTS: ${DEFAULT_CONSULTATION_PRICE_CENTS:-3000}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      CHECKOUT_EXPIRES_MINUTES: ${CHECKOUT_EXPIRES_MINUTES:-30}
      AUTO_REFUND_ON_CANCEL: ${AUTO_REFUND_ON_CANCEL:-true}
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python ejecutar.py"
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      servicio-usuarios:
        condition: service_started
      servicio-citas:
        condition: service_started

  servicio-inteligencia-iot:
    image: python:3.11-slim
    container_name: psicoconecta-iot
    working_dir: /backend/servicios/servicio-inteligencia-iot
    volumes:
      - ./backend:/backend:ro
    env_file:
      - ./.env.example
    environment:
      JWT_SECRET_KEY: change_this_jwt_secret_at_least_32_chars
      DEVICE_TOKEN: esp32_secret_device_token_2026
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python aplicacion.py & python telemetria/ejecutar.py"
    ports:
      - "5005:5005"
      - "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy

  puerta-enlace-api:
    build:
      context: .
      dockerfile: backend/puerta-enlace-api/Dockerfile
    container_name: psicoconecta-gateway
    environment:
      PORT: 5000
      USUARIOS_SERVICE_URL: http://servicio-usuarios:5001
      CITAS_SERVICE_URL: http://servicio-citas:5002
      TELECONSULTA_SERVICE_URL: http://servicio-teleconsulta:5003
      PAGOS_SERVICE_URL: http://servicio-pagos:5004
      IOT_SERVICE_URL: http://servicio-inteligencia-iot:5005
    ports:
      - "5000:5000"
    depends_on:
      - servicio-usuarios
      - servicio-citas
      - servicio-teleconsulta
      - servicio-pagos

  nginx:
    image: nginx:alpine
    container_name: psicoconecta-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - puerta-enlace-api
      - servicio-inteligencia-iot

volumes:
  postgres_data:

