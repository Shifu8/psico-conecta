services:
  postgres:
    image: postgres:16-alpine
    container_name: psicoconecta-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psicoconecta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infraestructura/postgres/inicializar_esquemas.sql:/docker-entrypoint-initdb.d/01-inicializar-esquemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psicoconecta"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: psicoconecta-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@psicoconecta.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
